name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: v
        run: echo "version=$(perl .github/workflows/scripts/version.pl)" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.version.outputs.version }}
      release-kind: release
      changelog-flag: --release v${{ needs.version.outputs.version }}

  nuget:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # The cloud storage library is platform-agnostic (net10.0), so it packs and
      # ships from the Linux runner independently of the Windows release artifacts.
      - name: Pack Hawkynt.CloudStorage
        run: >
          dotnet pack Hawkynt.CloudStorage/Hawkynt.CloudStorage.csproj
          -c Release
          -p:Version=${{ needs.version.outputs.version }}
          -p:PackageVersion=${{ needs.version.outputs.version }}
          --output nupkg

      - name: Push to NuGet
        env:
          NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key "$NUGET_TOKEN"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.console-artifact }}", path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.ui-artifact }}",      path: dist }

      # Notes = a short curated header + the commit-prefix changelog (+ - * # !),
      # NOT GitHub's PR-based "What's Changed".
      - name: Compose release notes
        env:
          V: ${{ needs.version.outputs.version }}
        run: |
          node .github/workflows/scripts/update-changelog.mjs --release "v$V" --notes CHANGES.md
          echo "## DriveBenderUtility v$V" > RELEASE_NOTES.md
          echo >> RELEASE_NOTES.md
          cat CHANGES.md >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: dist/*.zip
          body_path: RELEASE_NOTES.md
